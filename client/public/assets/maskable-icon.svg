<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <!-- ERPRAY-PATCH: the maskable PWA icon source (BRAND_GUIDE.md §5 mark).
       Maskable icons get cropped to a circle/rounded-square/squircle by the
       OS depending on platform, keeping only the inner ~80%-diameter "safe
       zone" (https://w3c.github.io/manifest/#icon-masks) — a plain export of
       favicon.svg at 512x512 would lose the beam's tips off a circular crop.
       Fix: an Ink (#06080F) background at FULL BLEED (required — a
       maskable icon with transparent edges renders as a black square on
       platforms that don't respect alpha here), with the existing mark
       scaled down and centered well inside the safe zone. Same beam
       gradient/geometry as favicon.svg and Wordmark.tsx — keep in sync. -->
  <rect x="0" y="0" width="512" height="512" fill="#06080F" />
  <g transform="translate(106, 106) scale(9.375)">
    <rect x="2" y="2" width="28" height="28" rx="7" fill="#121A2E" />
    <defs>
      <linearGradient id="erpray-beam-maskable" x1="6" y1="26" x2="27" y2="5" gradientUnits="userSpaceOnUse">
        <stop offset="0" stop-color="#FFD34D" />
        <stop offset="0.55" stop-color="#F5A623" />
        <stop offset="1" stop-color="#FF7847" />
      </linearGradient>
    </defs>
    <path d="M7 25 L25 6" stroke="url(#erpray-beam-maskable)" stroke-width="3.4" stroke-linecap="round" />
    <path d="M10.5 27 L27.5 9" stroke="url(#erpray-beam-maskable)" stroke-width="1.4" stroke-linecap="round" opacity="0.45" />
  </g>
</svg>
